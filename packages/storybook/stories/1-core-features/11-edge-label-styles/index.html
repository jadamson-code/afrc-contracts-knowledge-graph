<style>
  html,
  body,
  #storybook-root,
  #sigma-container {
    width: 100%;
    height: 100%;
    margin: 0 !important;
    padding: 0 !important;
    overflow: hidden;
    font-family: sans-serif;
  }
  #controls {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #ffffffcc;
    padding: 10px;
    max-width: 220px;
  }
  h4 {
    margin: 0;
  }
  fieldset {
    border: none;
    padding: 0;
    margin: 0;
  }
  fieldset > div {
    margin-bottom: 0.3em;
  }
  label {
    font-size: 12px;
  }
</style>
<div id="sigma-container"></div>
<form id="controls">
  <fieldset>
    <h4>Label Options</h4>
    <div>
      <label for="label-position">Position:</label>
      <select id="label-position" name="label-position">
        <option value="auto" selected>Auto</option>
        <option value="above">Above</option>
        <option value="below">Below</option>
        <option value="over">Over</option>
      </select>
    </div>
    <div>
      <label for="font-size-mode">Font size:</label>
      <select id="font-size-mode" name="font-size-mode">
        <option value="fixed" selected>Fixed</option>
        <option value="scaled">Scaled with zoom</option>
      </select>
    </div>
    <div>
      <input type="checkbox" id="show-border" name="show-border" />
      <label for="show-border">Text border</label>
    </div>
    <h4 style="margin-top: 10px">Extremities</h4>
    <div>
      <label for="head-type">Head:</label>
      <select id="head-type" name="head-type">
        <option value="none">None</option>
        <option value="arrow" selected>Arrow</option>
      </select>
    </div>
    <div>
      <label for="tail-type">Tail:</label>
      <select id="tail-type" name="tail-type">
        <option value="none" selected>None</option>
        <option value="arrow">Arrow</option>
      </select>
    </div>
  </fieldset>
</form>
